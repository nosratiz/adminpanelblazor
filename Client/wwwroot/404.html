<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SampleBlazor Admin</title>
    <base href="/" />
    <script>
        var basePath = document.querySelector("base").getAttribute("href");
        var pathSegmentsToKeep = basePath
            .replace(/^\/+|\/+$/g, "")
            .split("/")
            .filter(Boolean)
            .length;
        var locationData = window.location;
        var redirectPath = locationData.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~");
        var redirectQuery = locationData.search
            ? "&" + locationData.search.slice(1).replace(/&/g, "~and~")
            : "";

        locationData.replace(
            locationData.protocol + "//" + locationData.hostname + (locationData.port ? ":" + locationData.port : "") +
            locationData.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
            "/?/" + redirectPath + redirectQuery + locationData.hash
        );
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="boot-shell">
            <div class="boot-card">
                <div class="boot-orb"></div>
                <div class="boot-label">Redirecting to admin workspace...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>
</html>
